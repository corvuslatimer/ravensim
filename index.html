<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raven Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="overlay" class="overlay">
    <div class="card">
      <h1>Raven Simulator (3D)</h1>
      <p>Fly through a mellow world, collect shinies, vibe.</p>
      <ul>
        <li>WASD: move</li>
        <li>Space / Ctrl: up / down</li>
        <li>Shift: glide boost</li>
        <li>Mouse: look around</li>
        <li>Click: lock cursor + start</li>
      </ul>
      <button id="startBtn">Start</button>
    </div>
  </div>

  <div id="hud">Shiny: <span id="score">0</span></div>
  <canvas id="game"></canvas>

  <script type="module" src="game.js"></script>
</body>
</html>
