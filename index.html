<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raven Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="overlay" class="overlay">
    <div class="card">
      <h1>Raven Simulator</h1>
      <p>Glide, collect shiny things, and just vibe.</p>
      <ul>
        <li>WASD / Arrow Keys: move</li>
        <li>Shift: glide boost</li>
        <li>Space: caw</li>
      </ul>
      <button id="startBtn">Start</button>
    </div>
  </div>

  <canvas id="game" width="1280" height="720" aria-label="Raven Simulator"></canvas>
  <script src="game.js"></script>
</body>
</html>
